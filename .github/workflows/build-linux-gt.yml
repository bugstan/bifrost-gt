name: Build Linux Native GT

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Build UI
        run: make build-ui

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Extract Version
        id: get_version
        run: echo "VERSION=$(cat transports/version)-gt" >> $GITHUB_ENV

      - name: Build Bifrost HTTP (Linux AMD64)
        run: |
          mkdir -p dist/
          cd transports/bifrost-http
          env GOWORK=off CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -tags "netgo,osusergo,sqlite_static" \
            -ldflags "-s -w -buildid= -extldflags '-static' -X main.Version=v${{ env.VERSION }}" \
            -o ../../dist/bifrost-http-linux-amd64-gt .
            
      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ env.VERSION }}"
          gh release create "$TAG_NAME" dist/* --title "Bifrost HTTP $TAG_NAME (GT Branch)" --notes "Custom Linux AMD64 build for GT Branch." || gh release upload "$TAG_NAME" dist/* --clobber
